services:
  bot:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:${PORT:-3847}:${PORT:-3847}"
    env_file: .env
    environment:
      # Override for Docker-internal networking
      DATABASE_URL: postgres://helyx:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/helyx
      OLLAMA_URL: http://host.docker.internal:11434
      OPENCODE_HOST: host.docker.internal
      DOWNLOADS_DIR: /app/downloads
      HOST_DOWNLOADS_DIR: ${HOST_DOWNLOADS_DIR:-${PWD}/downloads}
      KNOWLEDGE_BASE: ${KNOWLEDGE_BASE:-}
      HOST_CLAUDE_CONFIG: /host-claude-config
      HOST_PROJECTS_DIR: ${HOST_PROJECTS_DIR:-${HOME}/bots}
      HOST_HOME: ${HOME}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./downloads:/app/downloads
      - ${HOME}/.claude:/host-claude-config
      - ${KNOWLEDGE_BASE_PATH:-./.empty}:/app/knowledge-base:ro
      - ./tmux-projects.json:/app/tmux-projects.json
      - ${HOST_PROJECTS_DIR:-${HOME}/bots}:/host-projects:ro
      - ${HOME}:/host-home:ro
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"fetch('http://localhost:${PORT:-3847}/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - helyx

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: helyx
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: helyx
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helyx -d helyx"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - helyx

  # Optional: local Whisper ASR fallback (if GROQ_API_KEY is not set)
  # whisper:
  #   image: onerahmet/openai-whisper-asr-webservice:latest
  #   restart: unless-stopped
  #   environment:
  #     ASR_MODEL: medium
  #   healthcheck:
  #     test: ["CMD-SHELL", "curl -sf http://localhost:9000/ || exit 1"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 10
  #     start_period: 30s
  #   networks:
  #     - helyx

volumes:
  pgdata:
    name: helyx-pgdata

networks:
  helyx:
